# Task configuration for LogiChain environment
# Each task defines a concrete objective with a deterministic grader

default_task: quick_delivery

tasks:
  quick_delivery:
    name: "Quick Delivery"
    difficulty: easy
    description: "Deliver as many orders as possible before they pile up"
    done_condition:
      type: time_limit
      max_time_steps: 30
    grader:
      type: count_based
      weights:
        delivered: 1.0
        failed: -0.5

  on_time_efficiency:
    name: "On-Time Efficiency"
    difficulty: medium
    description: "Maximize on-time deliveries while minimizing failures"
    done_condition:
      type: all_resolved
    grader:
      type: efficiency
      weights:
        on_time: 0.6
        delivered: 0.2
        failed: -0.2

  deadline_priority:
    name: "Deadline Priority"
    difficulty: hard
    description: "Handle high-priority (tight deadline) orders first"
    done_condition:
      type: all_resolved
    grader:
      type: priority
      weights:
        high_priority_delivered: 0.5
        on_time: 0.3
        failed_high_priority: -0.5