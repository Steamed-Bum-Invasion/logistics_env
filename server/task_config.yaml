# Task configuration for LogiChain environment
# Each task defines a concrete objective
# Difficulty range: very_easy -> very_hard

default_task: quick_delivery

tasks:
  speed_run:
    name: "Speed Run"
    difficulty: very_easy
    description: "Deliver as many orders as possible in a short time window"
    done_condition:
      type: time_limit
      max_time_steps: 20

  quick_delivery:
    name: "Quick Delivery"
    difficulty: easy
    description: "Deliver as many orders as possible before they pile up"
    done_condition:
      type: time_limit
      max_time_steps: 30

  on_time_efficiency:
    name: "On-Time Efficiency"
    difficulty: medium
    description: "Maximize on-time deliveries while minimizing failures"
    done_condition:
      type: all_resolved

  deadline_priority:
    name: "Deadline Priority"
    difficulty: hard
    description: "Handle high-priority (tight deadline) orders first"
    done_condition:
      type: all_resolved

  throughput_master:
    name: "Throughput Master"
    difficulty: very_hard
    description: "Achieve high volume while maintaining on-time efficiency"
    done_condition:
      type: all_resolved
